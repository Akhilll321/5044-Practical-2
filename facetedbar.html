<!doctype html>
<html>
  <head>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <title>Breastfeeding rates among richest and poorest 20%</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        box-sizing: border-box;
        font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      h2 {
        margin: 14px 12px 4px 12px;
        font-size: 16px;
        text-align: center;
        font-weight: bold;
      }

      /* Share the body font across every SVG text element */
      svg text,
      svg text tspan {
        font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
      }

      /* Flex row of SVGs, each shares the width and scales via viewBox */
      #div1 {
        display: flex;
        flex: 1;
        min-height: 0;
        gap: 6px;
        padding: 6px 12px 10px 12px;
        box-sizing: border-box;
      }
      #div1 svg {
        flex: 1;
        min-width: 0;
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }

      #svg1 { fill: #ff9800; }
      #svg2 { fill: #3f51b5; }
      #svg3 { fill: #800080; }

      .cname {
        font-size: 19px;
        font-weight: bold;
      }

      .nodata-note {
        font-size: 10px;
        fill: #999;
        font-style: italic;
      }

      .empty {
        color: #999;
        font-size: 12px;
        text-align: center;
        margin-top: 60px;
      }
    </style>
  </head>

  <body>
    <h2>Comparison of Continued Breastfeeding Rates Between the Richest and Poorest 20% by Country</h2>

     <div id="empty" class="empty">Click up to three countries on the map to see its Poorest-vs-Richest comparison.</div>

    <div id="div1" style="display:none;">
      <svg id="svg1" viewBox="-40 -30 200 260" preserveAspectRatio="xMidYMid meet"></svg>
      <svg id="svg2" viewBox="-40 -30 200 260" preserveAspectRatio="xMidYMid meet"></svg>
      <svg id="svg3" viewBox="-40 -30 200 260" preserveAspectRatio="xMidYMid meet"></svg>
    </div>


    <script>
      var dataPath = "data/final_new3.csv";

      d3.csv(dataPath).then(function (myData) {
        // Parse the richest/poorest columns; "-" becomes 0 (treated as missing)
        myData.forEach((element) => {
          let poorest = element["Poorest 20%"];
          let richest = element["Richest 20%"];
          element["Poorest 20%"] = poorest === "-" ? 0 : parseInt(poorest);
          element["Richest 20%"] = richest === "-" ? 0 : parseInt(richest);
        });

        var w = 140;
        var h = 190;

        // Tunable bar thickness — raise for chunkier bars, lower for thinner
        var BAR_MAX_W = 40;

        var groups = ["Poorest 20%", "Richest 20%"];
        var cat = d3.scaleBand().domain(groups).range([0, w]).padding([0.2]);
        var num = d3.scaleLinear().domain([0, 100]).range([h, 0]);

        // Clamp each bar's width and centre it inside its band
        var barW = () => Math.min(cat.bandwidth(), BAR_MAX_W);
        var barX = d  => cat(d.group) + (cat.bandwidth() - barW()) / 2;

        // Per-chart setup: title slot above, two axes below
        function buildChart(svgSel) {
          var chart = svgSel.append("g");
          chart.append("text")
            .attr("class", "cname")
            .attr("text-anchor", "middle")
            .attr("x", w / 2)
            .attr("y", -4);
          chart.append("g")
            .attr("transform", `translate(0, ${h})`)
            .call(d3.axisBottom(cat));
          chart.append("g").call(d3.axisLeft(num));
          return chart;
        }

        var firstchart  = buildChart(d3.select("#svg1"));
        var secondchart = buildChart(d3.select("#svg2"));
        var thirdchart  = buildChart(d3.select("#svg3"));

        function updategraph(name, chart, col) {
          var field = myData.filter(function (d) {
            return d.Country == name;
          });
          var countrylist = field[0];
          if (!countrylist) return;

          chart.select(".cname").text(countrylist.Country);
          chart.selectAll(".nodata-note").remove();
          if (countrylist["Poorest 20%"] == 0 && countrylist["Richest 20%"] == 0) {
            var note = chart.append("text")
              .attr("class", "nodata-note")
              .attr("x", w / 2)
              .attr("y", h / 2 - 10)
              .attr("text-anchor", "middle");
            note.append("tspan").attr("x", w / 2).text("No data for the");
            note.append("tspan").attr("x", w / 2).attr("dy", "1.2em").text("richest & poorest 20%");
            note.append("tspan").attr("x", w / 2).attr("dy", "1.2em").text("in this country");
          }

          var results = [
            { group: "Poorest 20%", c: countrylist["Poorest 20%"] },
            { group: "Richest 20%", c: countrylist["Richest 20%"] }
          ];

          var fillColor = col === 0 ? "#ff9800"
                        : col === 1 ? "#3f51b5"
                        :              "#800080";

          // Bars grow upward from the baseline on enter
          chart.selectAll(".bar")
            .data(results)
            .join(
              enter => enter.append("rect")
                .attr("class", "bar")
                .attr("x", barX)
                .attr("y", h)
                .attr("width", barW())
                .attr("height", 0)
                .attr("fill-opacity", 0.3)
                .attr("stroke-opacity", 1.0)
                .attr("stroke-width", 2),
              update => update,
              exit => exit.remove()
            )
            .attr("fill",   fillColor)
            .attr("stroke", fillColor)
            .transition()
            .duration(535)
            .attr("x",      barX)
            .attr("y",      z => z.c == 0 ? h : num(z.c))
            .attr("width",  barW())
            .attr("height", z => z.c == 0 ? 0 : num(0) - num(z.c));

          // Percent labels — skip missing values 
          var labelData = results.filter(z => z.c > 0);
          chart.selectAll(".perctext")
            .data(labelData, z => z.group)
            .join(
              enter => enter.append("text")
                .attr("class", "perctext")
                .attr("x", z => cat(z.group) + cat.bandwidth() / 2)
                .attr("y", h)
                .attr("text-anchor", "middle")
                .style("font-size", 14)
                .style("fill", "black")
                .style("font-weight", "bold")
                .style("opacity", 0),
              update => update,
              exit => exit.remove()
            )
            .text(z => z.c + "%")
            .transition()
            .duration(535)
            .attr("x", z => cat(z.group) + cat.bandwidth() / 2)
            .attr("y", z => num(z.c) + 15)
            .style("opacity", 1);
        }


        function clearChart(chart) {
          chart.selectAll(".nodata-note").remove();
          chart.selectAll(".bar").remove();
          chart.selectAll(".perctext").remove();
        }

        // Redraw all three charts whenever the map selection changes
        function redraw(names) {
          var hasAny = names && names.length > 0;
          d3.select("#empty").style("display", hasAny ? "none" : null);
          d3.select("#div1") .style("display", hasAny ? null : "none");

          if (names[0]) updategraph(names[0], firstchart,  0); else clearChart(firstchart);
          if (names[1]) updategraph(names[1], secondchart, 1); else clearChart(secondchart);
          if (names[2]) updategraph(names[2], thirdchart,  2); else clearChart(thirdchart);

          // Hide unused panels when fewer than three countries are selected
          d3.select("#svg2").style("display", names[1] ? null : "none");
          d3.select("#svg3").style("display", names[2] ? null : "none");
        }

        // Selection sync relayed by index.html
        window.addEventListener("syncCountries", function (e) {
          var names = (e.detail && e.detail.names) || [];
          redraw(names);
        });
      });
    </script>
  </body>
</html>
