<!doctype html>
<html>
  <head>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <title>Breastfeeding rates among richest and poorest 20%</title>

    <style>
      body,
      html {
        margin-top:20px;
        flex-direction:column;
      }
      h2 {
        font-size: 16px;
        text-align:center;
        font-weight:bold;
        
      }
      #div1 {
       display:flex;
       margin-top:30px;
       margin-left:10px;
      }

      svg {
        overflow:visible;
        padding-left: 32px;
        padding-top: 23px;
        padding-right: 55px;
       
      }
      
      #svg1 {fill:#ff9800; 
      }
      #svg2 { fill:#3f51b5;
       }
      
      .cname        {
         font-size: 19px;
         font-weight: bold; }

      .nodata-note {
        font-size: 10px;
        fill: #999;
        font-style: italic;
      }

      .empty {
        color: #999;
        font-size: 12px;
        text-align: center;
        margin-top: 80px;
      }
    </style>
  </head>

  <body>
    <h2>Comparison of Continued Breastfeeding Rates Between the Richest and Poorest 20% by Country</h2>

     <div id="empty" class="empty">Click one or two countries on the map to see its Poorest-vs-Richest comparison.</div>

    <div id="div1" style="display:none;">
      <svg id="svg1" width="270" height="220"></svg>
      <svg id="svg2" width="270" height="220"></svg>
    
    </div>


    <script>
      var dataPath = "data/final_new3.csv";

      d3.csv(dataPath).then(function (myData) {
        // Data cleaning
        myData.forEach((element) => {
          let poorest = element["Poorest 20%"];
          let richest = element["Richest 20%"];
          element["Poorest 20%"] = poorest === "-" ? 0 : parseInt(poorest);
          element["Richest 20%"] = richest === "-" ? 0 : parseInt(richest);

        });
     

        w = 220;
        h = 190;

        var groups = ["Poorest 20%", "Richest 20%"];
        
        var cat = d3.scaleBand().domain(groups).range([0, w]).padding([0.2]);
        var num = d3.scaleLinear().domain([0, 100]).range([h, 0]);

        // Chart 1

        var svgone = d3.select("#svg1");
        var firstchart = svgone.append("g");

        firstchart
          .append("text")
          .attr("class", "cname")
          .attr("text-anchor", "middle")
          .attr("x", w / 2)
          .attr("y",-4);

        firstchart
          .append("g")
          .attr("transform", `translate(0, ${h})`)
          .call(d3.axisBottom(cat));
        firstchart.append("g").call(d3.axisLeft(num));

        // Chart 2
        var svgtwo = d3.select("#svg2");
        var secondchart = svgtwo.append("g");

        secondchart
          .append("text")
          .attr("class", "cname")
          .attr("text-anchor", "middle")
          .attr("x", w / 2)
          .attr("y", -4);

        secondchart
          .append("g")
          .attr("transform", `translate(0, ${h})`)
          .call(d3.axisBottom(cat));
        secondchart.append("g").call(d3.axisLeft(num));

     
        function updategraph(name, chart, slotIdx) {
          var field = myData.filter(function (d) {
            return d.Country == name;
          });
          var countrylist = field[0];
          if (!countrylist) return;

          chart.select(".cname").text(countrylist.Country);
          chart.selectAll(".nodata-note").remove();
          chart.selectAll(".bar").remove();
          chart.selectAll(".perctext").remove();
          if (countrylist["Poorest 20%"] == 0 && countrylist["Richest 20%"] == 0) {
            chart.append("text")
              .attr("class", "nodata-note")
              .attr("x", w / 2+20).attr("y", h / 2)
              .attr("text-anchor", "middle")
              .text("No data for the richest & poorest 20% in this country");
          }
          let poorest = countrylist["Poorest 20%"];
          let richest = countrylist["Richest 20%"];
          var results = [
          { group: "Poorest 20%", c: poorest },
          { group: "Richest 20%", c: richest }
          ];

          chart
            .selectAll(".bar")
            .data(results)
            .join("rect")
            .attr("class", "bar")
            .transition()
            .duration(535)
            .attr("x",function(z){return cat(z.group)})
            .attr("y",function (z) {
              return z.c == 0 ? h : num(z.c);
            })
            .attr("width", cat.bandwidth())
            .attr("height",function (z) {
              return z.c == 0 ? 0 : num(0) - num(z.c);
            })

            chart.selectAll(".perctext")
            .attr("class","perctext")
            .data(results)
            .join("text")
            .transition().duration(625)
            .text(z =>z.c+"%")
            .attr("x", z=> cat(z.group) + cat.bandwidth()/2)
            .attr("y", z => (z.c == 0 ? num(0) : num(z.c)) + 15)
            .attr("text-anchor", "middle")
            .style("font-family", "sans-serif")
            .style("font-size", 14)
            .style("fill", "white");

        }


        function clearChart(chart) {
          chart.selectAll(".nodata-note").remove();
        }

        // Redraw both charts whenever the map selection changes
        function redraw(names) {
          var hasAny = names && names.length > 0;
          d3.select("#empty").style("display", hasAny ? "none" : null);
          d3.select("#div1") .style("display", hasAny ? null : "none");

          if (names[0]) updategraph(names[0], firstchart,  0); else clearChart(firstchart);
          if (names[1]) updategraph(names[1], secondchart, 1); else clearChart(secondchart);

          // Hide svg2 entirely when only one country is selected
          d3.select("#svg2").style("display", names[1] ? null : "none");
        }

        // Listen for the cross-iframe sync event relayed by index.html.
        window.addEventListener("syncCountries", function (e) {
          var names = (e.detail && e.detail.names) || [];
          redraw(names);
        });
        

      });
    </script>
  </body>
</html>
