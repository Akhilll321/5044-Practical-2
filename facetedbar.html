<!doctype html>
<html>
  <head>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <title>Breastfeeding rates among richest and poorest 20%</title>

    
    <style>
      body,
      html {
        margin: 0;
        padding: 20px;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #div1 {
        display: flex;
        flex-direction: row; 
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        gap: 20px;
      }
      #div2 {
        display: flex;
        justify-content: space-around;
        width: 1200px;
        margin-top: 10px;
      }

      select {
        padding: 5px;
        font-size: 14px;
      }

      svg {
        border: 1px ;
        padding-left: 62px;
        padding-top: 31px;
        padding-bottom: 52px;
        padding-right: 31px;
        overflow: visible;
      }
    </style>
  </head>

  <body>
    <h2>Comparing adoloscent education between countries</h2>

    <div id="div1">
      <svg id="svg1" width="450" height="400"></svg>
      <svg id="svg2" width="450" height="400"></svg>
      
    </div>

    <script>
      var dataPath = "data/final_new3.csv";

      d3.csv(dataPath).then(function (myData) {
        //Data cleaning
        myData.forEach((element) => {
          let poorest = element["Poorest 20%"];
          let richest = element["Richest 20%"];
          element["Poorest 20%"] = poorest === "-" ? 0 : parseInt(poorest);
          element["Richest 20%"] = richest === "-" ? 0 : parseInt(richest);

        });

     

        w = 380;
        h = 300;

        
        var groups = ["Poorest 20%", "Richest 20%"];
        
        var cat = d3.scaleBand().range([0, w]).domain(groups).padding([0.3]);
        var num = d3.scaleLinear().range([h, 0]).domain([0, 100]);

    

        var svgone = d3.select("#svg1");
        var firstchart = svgone.append("g");

        firstchart
          .append("g")
          .selectAll("text")
          .join("text")
          .text((d) => d)
          .attr("class", "cname")
          .attr("text-anchor", "middle")
          .style("font-weight", "bold")
          .attr("x", w / 2)
          .attr("y",-10);

        firstchart
          .append("g")
          .attr("transform", `translate(0, ${h})`)
          .call(d3.axisBottom(cat))
          .selectAll("text")
        firstchart.append("g").call(d3.axisLeft(num));

       
        var svgtwo = d3.select("#svg2");
        var secondchart = svgtwo.append("g");

        secondchart
          .append("g")
          .selectAll("text")
          .join("text")
          .text((d) => d)
          .attr("class", "cname")
          .attr("text-anchor", "middle")
          .style("font-weight", "bold")
          .attr("x", w / 2)
          .attr("y", -10);

        secondchart
          .append("g")
          .attr("transform", `translate(0, ${h})`)
          .call(d3.axisBottom(cat))
          .selectAll("text")
        secondchart.append("g").call(d3.axisLeft(num));

     
        function updategraph(name, chart) {
          var field = myData.filter(function (d) {
            return d.Countries == name;
          });
          var countrylist = field[0];
          chart.select(".cname").text(countrylist.Countries);
         if(countrylist["Poorest 20%"]===0){
          alert("No data available for the poorest 20% for this country ")
         }
         if(countrylist["Richest 20%"]===0){
          alert("No data available for the richest 20% for this country")
         }

          var results = [
            {
               group: "Poorest 20%", c: countrylist["Poorest 20%"]},
               {group:"Richest 20%", c: countrylist["Richest 20%"]}
          ];

          var bars = chart
            .selectAll("cgrp")
            .data(groups)
            .join("g")
            .attr("class", "cgrp")
            .attr("transform", function (g) {
              return "translate(" + cat(g) + ",0)";
            });

           

          bars.selectAll(".bar").data(function (subname) {
            return results.filter(function (j) {
              return j.group === subname;
            });
          })

            .join("rect")
            .attr("class", "bar")
            .transition()
            .duration(520)
            .attr("x",0)
            .attr("y", function (d) {
              return num(d.c);
            })
            .attr("width", cat.bandwidth())
            .attr("height", function (d) {
              return h - num(d.c);
            })
            .style("fill",function(d) {
              if (d.group === "Poorest 20%") {
                return "orange";
              } else {
                return "blue";
              }
            });
        }

      });
    </script>
  </body>
</html>
