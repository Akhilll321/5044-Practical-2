<!doctype html>
<html>
  <head>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <title>Breastfeeding rates among richest and poorest 20%</title>

    <style>
      body,
      html {
        margin: 0;
        padding: 10px;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
      }
      h2 {
        font-size: 14px;
        margin: 10px 0 4px 0;
        text-align: center;
      }
      #div1 {
        display: flex;
        flex-direction: row; 
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        gap: 10px;
      
      }

      svg {
        padding-left: 42px;
        padding-top: 18px;
        padding-bottom: 30px;
        padding-right: 18px;
        overflow: visible;
      }
      
      /*color consistency*/
      .cname        { font-size: 12px; font-weight: bold; }
      .cname.slot-0 { fill: #ff9800; } 
      .cname.slot-1 { fill: #3f51b5; }

      .nodata-note {
        font-size: 10px;
        fill: #999;
        font-style: italic;
      }

      .empty-msg {
        color: #999;
        font-size: 12px;
        text-align: center;
        margin-top: 80px;
      }
    </style>
  </head>

  <body>
    <h2>Comparison of Continued Breastfeeding Rates Between the Richest and Poorest 20% by Country</h2>

     <div id="empty-msg" class="empty-msg">Click one or two countries on the map to see its Poorest-vs-Richest comparison.</div>

    <div id="div1" style="display:none;">
      <svg id="svg1" width="340" height="300" viewBox="0 0 340 300" preserveAspectRatio="xMidYMid meet"></svg>
      <svg id="svg2" width="340" height="300" viewBox="0 0 340 300" preserveAspectRatio="xMidYMid meet"></svg>
    
    </div>


    <script>
      var dataPath = "data/final_new3.csv";

      // country-level colours matching the map (slot 0 = orange, slot 1 = indigo)
      var slotColors = ["#ff9800", "#3f51b5"];

      d3.csv(dataPath).then(function (myData) {
        // Data cleaning
        myData.forEach((element) => {
          let poorest = element["Poorest 20%"];
          let richest = element["Richest 20%"];
          element["Poorest 20%"] = poorest === "-" ? null : parseInt(poorest);
          element["Richest 20%"] = richest === "-" ? null : parseInt(richest);

        });
     

        w = 240;
        h = 200;

        var groups = ["Poorest 20%", "Richest 20%"];
        
        var cat = d3.scaleBand().range([0, w]).domain(groups).padding([0.3]);
        var num = d3.scaleLinear().range([h, 0]).domain([0, 100]);

        // Chart 1

        var svgone = d3.select("#svg1");
        var firstchart = svgone.append("g");

        firstchart
          .append("text")
          .attr("class", "cname slot-0")
          .attr("text-anchor", "middle")
          .attr("x", w / 2)
          .attr("y", -4);

        firstchart
          .append("g")
          .attr("transform", `translate(0, ${h})`)
          .call(d3.axisBottom(cat));
        firstchart.append("g").call(d3.axisLeft(num));

        // Chart 2
        var svgtwo = d3.select("#svg2");
        var secondchart = svgtwo.append("g");

        secondchart
          .append("text")
          .attr("class", "cname slot-1")
          .attr("text-anchor", "middle")
          .attr("x", w / 2)
          .attr("y", -4);

        secondchart
          .append("g")
          .attr("transform", `translate(0, ${h})`)
          .call(d3.axisBottom(cat));
        secondchart.append("g").call(d3.axisLeft(num));

     
        function updategraph(name, chart, slotIdx) {
          var field = myData.filter(function (d) {
            return d.Country == name;
          });
          var countrylist = field[0];
          if (!countrylist) return;

          chart.select(".cname").text(countrylist.Country);
          chart.selectAll(".nodata-note").remove();
          if (countrylist["Poorest 20%"] == null && countrylist["Richest 20%"] == null) {
            chart.append("text")
              .attr("class", "nodata-note")
              .attr("x", w / 2).attr("y", h / 2)
              .attr("text-anchor", "middle")
              .text("No data for the richest & poorest 20% in this country");
          }

          var results = [
            { group: "Poorest 20%", c: countrylist["Poorest 20%"] },
            { group: "Richest 20%", c: countrylist["Richest 20%"] }
          ];

          var bars = chart
            .selectAll(".cgrp")
            .data(groups)
            .join("g")
            .attr("class", "cgrp")
            .attr("transform", function (g) {
              return "translate(" + cat(g) + ",0)";
            });

           

          bars.selectAll(".bar").data(function (subname) {
            return results.filter(function (j) {
              return j.group === subname;
            });
          })

            .join("rect")
            .attr("class", "bar")
            .transition()
            .duration(520)
            .attr("x", 0)
            .attr("y", function (d) {
              return d.c == null ? h : num(d.c);
            })
            .attr("width", cat.bandwidth())
            .attr("height", function (d) {
              return d.c == null ? 0 : h - num(d.c);
            })
            // color scheme A : one colour per country
            .style("fill", function (d) {
              return slotColors[slotIdx];
            });

            // color B: lighter vs darker
            // .style("fill", function (d) {
            //   if (slotIdx === 0) return d.group === "Poorest 20%" ? "#ffcc80" : "#ef6c00";
            //   return                     d.group === "Poorest 20%" ? "#9fa8da" : "#283593";
            // });

        }

        // Clear a chart back to an empty (axes-only) state when its slot is unused
        function clearChart(chart) {
          chart.select(".cname").text("");
          chart.selectAll(".cgrp").remove();
          chart.selectAll(".nodata-note").remove();
        }

        // Redraw both charts whenever the map selection changes
        function redrawFromSelection(names) {
          var hasAny = names && names.length > 0;
          d3.select("#empty-msg").style("display", hasAny ? "none" : null);
          d3.select("#div1")    .style("display", hasAny ? null : "none");

          if (names[0]) updategraph(names[0], firstchart,  0); else clearChart(firstchart);
          if (names[1]) updategraph(names[1], secondchart, 1); else clearChart(secondchart);

          // Hide svg2 entirely when only one country is selected
          d3.select("#svg2").style("display", names[1] ? null : "none");
        }

        // Listen for the cross-iframe sync event relayed by index.html.
        window.addEventListener("syncCountries", function (e) {
          var names = (e.detail && e.detail.names) || [];
          redrawFromSelection(names);
        });
        

      });
    </script>
  </body>
</html>
