<!DOCTYPE html>
 <html>
    <head>
        <meta charset="utf-8">
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <style>
            body {
                font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
                font-size: 14px;
                margin: 0;
                padding: 6px;
            }
            svg {
                display: block;
                width: 100%;
                height: calc(100vh - 14px);
            }

            /* Tooltip — styled to match the map tooltip */
            .tooltip {
                position: absolute;
                pointer-events: none;
                background: rgba(255, 255, 255, .97);
                border: 1px solid #bbb;
                border-radius: 6px;
                padding: 8px 10px;
                font-size: 12px;
                box-shadow: 0 4px 14px rgba(0, 0, 0, .12);
                max-width: 260px;
                line-height: 1.35;
                transition: opacity .1s;
            }
            .tooltip h4 { margin: 0 0 4px 0; font-size: 13px; }
            .tooltip .row { display: flex; justify-content: space-between; gap: 12px; }
            .tooltip .row span:last-child { font-variant-numeric: tabular-nums; }
        </style>
    </head>

    <body>
        <svg viewBox="-100 -100 760 760" ></svg>
        <div class="tooltip" id="tooltip" style="opacity:0;"></div>

        <script>
            let allData = [];
            let selectedCountries = [];
            let features = ["antenatal_care_4plus_%", "Continued breastfeeding (12–23 months) (%)All children", 
                            "gdp_percentile", "female_upper_secondary_education_%", 
                            "female_labour_force_participation_%"];
            
            let featureLabels = ["Antenatal Care (%)", "Continued BF(%)", "GDP Percentile", 
                                "Female Education (%)", "Female Labour (%)"];


            // Responsive svg view
            let width = 600;
            let height = 600;
            let svg = d3.select("svg");

            // Plot the grid lines
            let radialScale = d3.scaleLinear()
                .domain([0, 10])
                .range([0, 250]);
            let ticks = [0, 2, 4, 6, 8, 10];

            // Add circle
            svg.selectAll(".grid-circle")
                .data(ticks)
                .join(
                    enter => enter.append("circle")
                        .attr("class", "grid-circle") 
                        .attr("cx", width / 2)
                        .attr("cy", height / 2)
                        .attr("fill", "gray")
                        // Darker radar circles closer to the centre
                        .attr("fill-opacity", 0.1) 
                        .attr("stroke", "gray")
                        .attr("r", d => radialScale(d))
                        .style("pointer-events", "none")
                );
            
            // Add tick labels
            svg.selectAll(".ticklabel")
                .data(ticks)
                .join("text")
                .attr("class", "ticklabel")
                .attr("x", width / 2 + 5)
                .attr("y", d => height / 2 - radialScale(d))
                .style("font-size", "22px")
                .text(d => (d * 10) + "%");
           
            
            // Function to convert angle to coordinate
            function angleToCoordinate(angle, value) {
                let x = Math.cos(angle) * radialScale(value);
                let y = Math.sin(angle) * radialScale(value);
                return {"x": width / 2 + x, "y": height / 2 - y};
            }

            // HTML tooltip (styled in CSS to match the map tooltip)
            const tooltip = d3.select("#tooltip");

            // Format radar values for display in the tooltip
            const fmtVal = v => (v == null || v === "" || isNaN(+v))
                ? '<span style="color:#aaa">—</span>'
                : (+v).toLocaleString(undefined, { maximumFractionDigits: 1 }) + "%";

            // Flip the tooltip to the opposite side of the cursor when the default
            function placeTooltip(pageX, pageY) {
                const node   = tooltip.node();
                const tw     = node.offsetWidth;
                const th     = node.offsetHeight;
                const vw     = window.innerWidth;
                const vh     = window.innerHeight;
                const OFFSET = 14;
                const PAD    = 6;

                let left = pageX + OFFSET;
                let top  = pageY + OFFSET;
                if (left + tw + PAD > vw) left = pageX - tw - OFFSET;
                if (top  + th + PAD > vh) top  = pageY - th - OFFSET;
                left = Math.max(PAD, Math.min(left, vw - tw - PAD));
                top  = Math.max(PAD, Math.min(top,  vh - th - PAD));

                tooltip.style("left", left + "px").style("top", top + "px");
            }



            // Define line before using it
            let line = d3.line()
                .x(d => d.x)
                .y(d => d.y)
                .curve(d3.curveCardinalClosed);

            // Create feature data for axes
            let featureData = features.map((f, i) => {
                let angle = (Math.PI / 2) + (2 * Math.PI * i / features.length);
                return {
                    "name": f,
                    "angle": angle,
                    "line_coord": angleToCoordinate(angle, 10),
                    "label_coord": angleToCoordinate(angle, 11.5)
                };
            });

            // Draw axis line
            svg.selectAll("line")
                .data(featureData)
                .join("line")
                .attr("x1", width / 2)
                .attr("y1", height / 2)
                .attr("x2", d => d.line_coord.x)
                .attr("y2", d => d.line_coord.y)
                .attr("stroke", "black");

            // Draw axis label
            svg.selectAll(".axislabel")
                .data(featureData)
                .join("text")
                .attr("x", d => d.label_coord.x)
                .attr("y", d => d.label_coord.y)
                .text((d, i) => featureLabels[i])
                .attr("text-anchor", "middle")
                .style("font-size", "28px");

            let colors = ["#ff9800", "#3f51b5", "#800080"];//color alignment


            function getPathCoordinates(data_point){
                let coordinates = [];
                for (var i = 0; i < features.length; i++){
                    let ft_name = features[i];
                    let raw = data_point[ft_name];
                    if (raw === "" || raw === undefined || isNaN(+raw)) continue;
                    let angle = (Math.PI / 2) + (2 * Math.PI * i / features.length);
                    coordinates.push(angleToCoordinate(angle, raw / 10));
                }
                return coordinates;
            }


            function updateRadar() {
                // Remove old paths and circles
                svg.selectAll("path").remove();
                svg.selectAll("circle:not(.grid-circle)").remove();
                
                // Get selected countries data
                let plotData = allData.filter(d => selectedCountries.includes(d.Country));


                // Draw each country's path
                plotData.forEach((point, i) => {
                    let coordinates = getPathCoordinates(point);
                    // Use the original selection order so country 1/2/3 always
                    let colorIdx = selectedCountries.indexOf(point.Country);
                    if (colorIdx < 0) colorIdx = i;
                    let color = colors[colorIdx % colors.length];

                    // Draw path
                    svg.append("path")
                        .datum(coordinates)
                        .attr("d", line)
                        .attr("stroke-width", 4)
                        .attr("stroke", color)
                        .attr("fill", color)
                        .attr("stroke-opacity", 1)
                        .attr("fill-opacity", 0.3)

                        // Tooltip
                        .on("mouseover", (event) => {
                            const rows = featureLabels.map((label, k) =>
                                `<div class="row"><span>${label}</span><span>${fmtVal(point[features[k]])}</span></div>`
                            ).join("");
                            tooltip.html(
                                `<h4 style="color:${color};">${point.Country}</h4>` + rows
                            ).style("opacity", 1);
                            placeTooltip(event.pageX, event.pageY);
                        })
                        .on("mousemove", (event) => {
                            placeTooltip(event.pageX, event.pageY);
                        })
                        .on("mouseout", () => tooltip.style("opacity", 0));

                // Draw points
                    coordinates.forEach(coord => {
                        svg.append("circle")
                            .attr("cx", coord.x)
                            .attr("cy", coord.y)
                            .attr("r", 8)
                            .attr("fill", color);
                    });
                });
                svg.selectAll(".grid-circle").raise();
                svg.selectAll("tspan").raise();
            }
            // Load CSV 
            d3.csv("data/final_new3.csv").then(function(csvData) {
                allData = csvData;  
                updateRadar();
            });    
            
            // Receive selected countries from the map (relayed by index.html)
            window.addEventListener("syncCountries", (e) => {
                selectedCountries = (e.detail && e.detail.names) || [];
                updateRadar();
            });
            
    </script>
</html>
