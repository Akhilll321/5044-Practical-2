<!DOCTYPE html>
<html>
<head>
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<svg id="chart"></svg>
<script>
    let updateBubble; 

    // Load the data 
    d3.csv("child_mortality.csv").then(data => {

        // Find the mean and maximum mortality rates as a percentage
        const avg = d3.mean(data, d => d["Infant mortality rate"]) / 10;
        const max = d3.max(data, d => d["Infant mortality rate"]) / 10;

        // Map mortality rate from 0 to the max value and bubble radius from 5 to 40px
        const scale = d3.scaleLinear()
                        .domain([0, max])
                        .range([5, 40]);

        // Set dimensions and padding
        const svg = d3.select(".bubble-chart")
                        .attr("width", 220)
                        .attr("height", 120)
        const g = svg.append("g")
                        .attr("transform", "translate(10,20)");


        // Add a chart title 
        g.append("text")
            .attr("x", 100)
            .attr("y", -8)
            .attr("text-anchor", "middle")
            .style("font-size", "11px").style("font-weight", "500")
            .text("Infant mortality (% of births)");


        // Add the average mortality rate circle
        g.append("circle")
            .attr("class", "avg-circle")
            .attr("cx", 50)
            .attr("cy", 50)
            .attr("r", scale(avg))
            .attr("fill", "red")


        // Add a subtitle for global average
        g.append("text")
            .attr("x", 50)
            .attr("y", 100)
            .attr("text-anchor", "middle")
            .style("font-size", "10px")
            .text("Global average");

        // Add the current country's mortality rate circle
        g.append("circle")
            .attr("class", "country-circle")
            .attr("cx", 130)
            .attr("cy", 50)
            .attr("r", 0)
            .attr("fill", "red")

        // Add a subtitle for current country
        g.append("text")
            .attr("class", "country-label")
            .attr("x", 130)
            .attr("y", 100)
            .attr("text-anchor", "middle")
            .style("font-size", "10px")
            .text("Country");

        // Function to update the chart when a country is selected
        updateBubble = function(country) {
            const row = data.find(d => d.Country === country);

            // Hide the bubble chart if no data is found
            if (!row) {
                d3.select(".bubble-chart").style("display", "none");
                return;
            }

            const pct = row["Infant mortality rate"] / 10;

            // Show the bubble chart with correct size and country label
            d3.select(".bubble-chart")
                .style("display", "block");
            g.select(".country-circle")
                .attr("r", scale(pct));
            g.select(".country-label")
                .text(country);
        };
    });
</script>
</body>
</html>
